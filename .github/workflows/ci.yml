name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Dummy values so module-top-level clients (PrivyClient) construct
          # during Next's build data-collection. No real secrets in CI.
          NEXT_PUBLIC_PRIVY_APP_ID: ci-build-placeholder
          PRIVY_APP_SECRET: ci-build-placeholder
          NEXT_PUBLIC_SOLANA_CLUSTER: devnet

  audit:
    runs-on: ubuntu-latest
    # Non-blocking. The known advisories are Privy-transitive EVM noise tracked in
    # docs/dependency-security.md. This job surfaces NEW high-severity advisories
    # without failing PRs on the documented baseline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
