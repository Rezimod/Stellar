<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320" aria-label="Orion constellation">
  <!-- Constellation lines -->
  <g stroke="rgba(129,140,248,0.45)" stroke-width="1" fill="none">
    <!-- Shoulders -->
    <line x1="108" y1="88" x2="185" y2="92"/>
    <!-- Left side: Betelgeuse to Mintaka -->
    <line x1="108" y1="88" x2="120" y2="158"/>
    <!-- Right side: Bellatrix to Alnitak -->
    <line x1="185" y1="92" x2="178" y2="162"/>
    <!-- Belt: Mintaka - Alnilam - Alnitak -->
    <line x1="120" y1="158" x2="149" y2="161"/>
    <line x1="149" y1="161" x2="178" y2="162"/>
    <!-- Left leg: Mintaka to Rigel -->
    <line x1="120" y1="158" x2="112" y2="242"/>
    <!-- Right leg: Alnitak to Saiph -->
    <line x1="178" y1="162" x2="172" y2="238"/>
  </g>

  <!-- Stars -->
  <!-- Rigel (β) — brightest, bottom left -->
  <circle cx="112" cy="242" r="4.5" fill="#b0c4ff" opacity="0.95"/>
  <!-- Betelgeuse (α) — top left shoulder, orange-red -->
  <circle cx="108" cy="88" r="4" fill="#ffb347" opacity="0.90"/>
  <!-- Bellatrix (γ) — top right shoulder -->
  <circle cx="185" cy="92" r="2.8" fill="#c8d8ff" opacity="0.85"/>
  <!-- Mintaka (δ) — left belt -->
  <circle cx="120" cy="158" r="2.4" fill="#c8d8ff" opacity="0.80"/>
  <!-- Alnilam (ε) — center belt -->
  <circle cx="149" cy="161" r="2.6" fill="#c8d8ff" opacity="0.85"/>
  <!-- Alnitak (ζ) — right belt -->
  <circle cx="178" cy="162" r="2.4" fill="#c8d8ff" opacity="0.80"/>
  <!-- Saiph (κ) — bottom right -->
  <circle cx="172" cy="238" r="2.8" fill="#c8d8ff" opacity="0.82"/>

  <!-- Star labels -->
  <g fill="rgba(255,255,255,0.35)" font-size="9" font-family="system-ui,sans-serif">
    <text x="94" y="82">Betelgeuse</text>
    <text x="189" y="87">Bellatrix</text>
    <text x="96" y="258">Rigel</text>
    <text x="175" y="254">Saiph</text>
    <text x="131" y="152">Belt</text>
  </g>

  <!-- Title -->
  <text x="149" y="298" text-anchor="middle" fill="rgba(255,255,255,0.50)" font-size="11" font-family="system-ui,sans-serif" letter-spacing="0.12em">ORION</text>
</svg>
